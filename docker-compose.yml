services:
  app:
    build:
      context: .
      args:
        VITE_API_BASE: /api
    ports:
      - "80:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/resume-editor
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
